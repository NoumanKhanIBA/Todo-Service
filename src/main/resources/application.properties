spring.application.name=todo-service

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (useful for local debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson: use ISO-8601 for LocalDateTime
spring.jackson.serialization.write-dates-as-timestamps=false

server.port=8080

# Scheduler: run every minute
app.scheduler.past-due-cron=0 * * * * *
